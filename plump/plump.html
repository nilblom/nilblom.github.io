<html>
    <head>
        <script src="./plump.js?v=202604301518"></script>
        <link rel="stylesheet" href="plump.css">
    </head>
    <body style="user-select:none;">
        <div id="screen">

            <div id="menu-background">
                <div id="menu">
                    <div style="text-align:center;font-size:50px;padding: 10px -10px 10px 10px;"><u>Plump</u></div>
                    <div style="text-align:center;font-size:14px;">version 0.1</div>
                    <div id="menu-start-game" style="text-align:center;padding:10px;">Start game</div>
                </div>
            </div>

            <div id="cpu-scoreboard">
                <span>CPU scoreboard:</span>
                <span id="cpu-scoreboard-scores"></span>
            </div>
            
            <div id="player-scoreboard">
                <span>Player scoreboard:</span>
                <span id="player-scoreboard-scores"></span>
            </div>

            <div id="play-area">
            </div>

            <div id="stick-finished">
            </div>

            <div id="final-score">
            </div>

            <div id="choose-sticks">
                <div id="choose-sticks-round">Round 1/20</div>
                <div>Select the number of sticks:</div>
                <input></input>
                <button>Ok</button>
                <div id="cpu-selected-sticks"></div>
            </div>

            <div id="plump">
                <div></div>
            </div>

            <div id="cpu-score">
                <div>CPU score:</div>
                <span id="cpu-score-taken-sticks">1</span>/<span id="cpu-score-sticks">4</span>
            </div>

            <div id="player-score">
                <div>Player score:</div>
                <span id="player-score-taken-sticks">1</span>/<span id="player-score-sticks">4</span>
            </div>

            <div id="cpu-area">
            </div>

            <div id="player-area">
            </div>
        </div>
    </body>
</html>
